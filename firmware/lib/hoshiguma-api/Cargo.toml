[package]
name = "hoshiguma-api"
version = "0.1.0"
authors = ["Dan Nixon <dan@dan-nixon.com>"]
edition = "2024"
license = "MIT"

[features]
default = [
    "std",
    "device-cooler",
    "device-rear-sensor-board",
]
device-cooler = []
device-rear-sensor-board = []

std = [
  "serde/std",
]

[dependencies]
defmt = "1.0.1"
getset = "0.1.6"
heapless = { version = "0.9.2", features = ["defmt", "serde"] }
serde = { version = "1.0.210", default-features = false, features = ["derive"] }

[lints.rust]
unused_crate_dependencies = "deny"
