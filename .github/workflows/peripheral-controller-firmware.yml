---
name: Peripheral Controller Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'flake.*'
      - 'peripheral_controller/firmware/**'
  pull_request:
    paths:
      - 'flake.*'
      - 'peripheral_controller/firmware/**'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./peripheral_controller/firmware

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30

      - run: rustup target add thumbv6m-none-eabi

      - name: Clippy
        run: nix develop --command cargo clippy -- -Dwarnings

  build:
    name: Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./peripheral_controller/firmware

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30

      - run: rustup target add thumbv6m-none-eabi

      - name: Build
        run: |
          nix develop --command cargo build --release
          nix develop --command cargo build --release --features panic-probe
